<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>밍긴어게인 노래책</title>
    <link rel="stylesheet" href="/public/musicbook/musicbook.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="navbtn active">곡 리스트</div>
        <a class="navbtn" href="/admin">관리자</a>
      </aside>

      <div class="main">
        <header class="topbar">
          <div class="title">밍긴어게인,</div>
          <div class="right">
            <span id="sessionState" class="pill">VIEWER · 방문자 · 읽기 전용</span>
            <button id="adminLoginBtn" class="btn">세션/관리자 로그인</button>
          </div>
        </header>

        <section class="filters">
          <input id="q" class="input" placeholder="곡명 / 가수 검색" />
          <select id="genre" class="select">
            <option value="">장르 전체</option>
          </select>
          <select id="mood" class="select">
            <option value="">분위기 전체</option>
          </select>
          <select id="vocal" class="select">
            <option value="">보컬 전체</option>
          </select>
          <label class="chk"><input id="latestOnly" type="checkbox" /> 최신곡만</label>
          <button id="resetBtn" class="btn light">필터 초기화</button>
          <span id="resultInfo" class="muted"></span>
        </section>

        <section class="requests">
          <div class="sectionTitle">신청곡</div>
          <div class="requestForm">
            <input id="reqName" class="input" placeholder="닉네임" />
            <input id="reqTitle" class="input" placeholder="곡명" />
            <input id="reqArtist" class="input" placeholder="아티스트" />
            <input id="reqTarget" class="input" placeholder="담당자(선택)" />
            <button id="reqSubmit" class="btn">신청</button>
          </div>
          <div id="requestList" class="requestList"></div>
        </section>

        <section class="songs">
          <div class="sectionTitle">곡 리스트</div>
          <div id="songGrid" class="grid"></div>
          <div id="pager" class="pager"></div>
        </section>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/public/musicbook/musicbook.js"></script>
  </body>
</html>
