<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>밍긴어게인 노래책</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" />
    <link rel="stylesheet" href="/public/musicbook/musicbook.css" />
  </head>

  <body class="preload">
    <div class="loading-screen" id="loadingScreen">로딩 중...</div>
    <div class="toast" id="toast"></div>

    <div class="layout">
      <nav class="layout-nav">
        <div class="floating-nav">
          <button class="floating-btn nav-btn active" id="mainNavBtn" data-page="main" type="button">
            메인페이지
          </button>

          <button class="floating-btn nav-btn" id="songsNavBtn" data-page="songs" type="button">
            <img
              class="nav-icon"
              alt=""
              src="https://drive.google.com/thumbnail?id=1S1T-JAIIf3DWeclc9g4lHLGKTCH2_Uwx&sz=w48"
            />
            곡 리스트
          </button>

          <button class="floating-btn" id="chzzkBtn" type="button">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="1" y="1" width="22" height="22" rx="6" fill="#00E676"></rect>
              <path d="M7 7h10v2l-7 6h7v2H7v-2l7-6H7z" fill="#000"></path>
            </svg>
            밍디 치지직
          </button>

          <button class="floating-btn" id="discordBtn" type="button">
            <img
              class="nav-icon"
              alt=""
              src="https://i.namu.wiki/i/B6B7GiIqvNWDIPXCeKNGOhORQK4Gucb-Xu8xoWtm5ycArm8pj0DSh5KJBLPdsi_l2c3gnO9jTf3KD21IVQhGDz_tFOkEoIRW3qxZ1L3d8uvZApcn_YhOF32-ajjobuRfIYGvX3BAGaixSoNGDXsdpg.webp"
            />
            밍디 디스코드
          </button>

          <button class="floating-btn" id="youtubeBtn" type="button">
            <img class="nav-icon" alt="" src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" />
            밍디 유튜브
          </button>
        </div>
      </nav>

      <div class="layout-main">
        <div class="top-right">
          <div class="user-panel" id="userPanel">
            <img id="profilePhoto" class="profile-photo" alt="" />
            <div class="role-badge" id="roleBadge">VIEWER</div>
            <div class="user-meta">
              <span id="userDisplayName">방문자</span>
              <span id="userRoleText">읽기 전용</span>
            </div>
          </div>

          <button class="floating-btn black-btn" id="authButton" type="button">세션 / 관리자 로그인</button>
          <button class="floating-btn" id="sessionCreateBtn" type="button">세션 만들기</button>
          <button class="floating-btn" id="sessionJoinBtn" type="button">세션 참여</button>
          <button class="floating-btn" id="sessionLeaveBtn" type="button" style="display:none;">세션 나가기</button>
          <button class="floating-btn" id="sessionMembersBtn" type="button" style="display:none;">세션 멤버</button>
          <div class="session-badge" id="sessionBadge" style="display:none;"></div>
          <div class="session-badge turner-badge" id="turnerBadge" style="display:none;">현재 당신이 페이지터너입니다</div>
          <button class="floating-btn" id="adminToggleBtn" type="button" style="display: none">관리자 버튼</button>
          <button class="floating-btn" id="profileButton" type="button" style="display: none">프로필 관리</button>
        </div>

        <div class="admin-menu" id="adminControls">
          <button class="floating-btn" id="editBannerBtn" type="button">배너 수정</button>
          <button class="floating-btn" id="editNoticeBtn" type="button">공지 수정</button>
          <button class="floating-btn" id="editTitleBtn" type="button">타이틀 이미지 수정</button>
          <button class="floating-btn" id="syncAllBtn" type="button">전체 곡 동기화</button>
          <button class="floating-btn" id="syncFastBtn" type="button">최신곡 추가</button>
          <button class="floating-btn" id="createUserOpenBtn" type="button">유저 추가</button>
        </div>

        <div class="app-container">
          <section id="mainPage" class="page active">
            <div class="glass-card">
              <img
                id="bannerImage"
                class="banner-image"
                onerror="this.src='https://placehold.co/1200x400?text=NO+IMAGE'"
                alt=""
              />
            </div>

            <div class="glass-card">
              <div class="toolbar">
                <div class="section-title notice-title">공지사항</div>
              </div>
              <div id="noticeContent" class="notice-content"></div>
            </div>
          </section>

          <section id="songsPage" class="page">
            <div class="songs-title-row" id="songsTitleRow" style="display: none">
              <img id="songsTitleLogo" class="songs-title-logo" alt="" />
            </div>

            <div class="glass-card">
              <div class="search-grid">
                <input id="searchInput" class="input" placeholder="곡명 / 가수 검색" />

                <select id="genreFilter" class="select">
                  <option value="">장르 전체</option>
                  <option>KPOP</option>
                  <option>JPOP</option>
                  <option>POP</option>
                  <option>OST</option>
                  <option>기타</option>
                </select>

                <select id="moodFilter" class="select">
                  <option value="">분위기 전체</option>
                  <option>발라드</option>
                  <option>락발라드</option>
                  <option>밴드송</option>
                  <option>댄스</option>
                  <option>뮤지컬</option>
                  <option>힙합</option>
                  <option>동요</option>
                </select>

                <select id="vocalFilter" class="select">
                  <option value="">보컬 전체</option>
                  <option>남솔로</option>
                  <option>여솔로</option>
                  <option>듀엣</option>
                  <option>그룹곡</option>
                </select>
                
                <select id="availableVocalFilter" class="select">
                  <option value="">가능보컬 전체</option>
                </select>
                <button id="availabilityEditToggleBtn" class="floating-btn compact-btn" type="button" style="display:none;">가능곡 편집</button>

                <div class="random-controls">
                  <div class="random-actions-row">
                    <button class="floating-btn" id="randomPickBtn" type="button">랜덤 곡 고르기</button>
                    <button class="floating-btn compact-btn" id="resetFiltersBtn" type="button">필터 초기화</button>
                  </div>
                </div>
              </div>

              <div class="search-meta">
                <div id="resultCount" class="result-count"></div>
              </div>
            </div>

            <div class="glass-card">
              <div class="sort-bar">
                <button class="sort-btn" data-sort-field="createdAt" data-label="최신곡" type="button">최신곡</button>
                <button class="sort-btn" data-sort-field="title" data-label="곡명" type="button">곡명</button>
                <button class="sort-btn" data-sort-field="key" data-label="키" type="button">키</button>
                <button class="sort-btn" data-sort-field="artist" data-label="아티스트" type="button">아티스트</button>
                <button class="sort-btn" data-sort-field="genre" data-label="장르" type="button">장르</button>
                <button class="sort-btn" data-sort-field="mood" data-label="분위기" type="button">분위기</button>
                <button class="sort-btn" data-sort-field="vocal" data-label="보컬" type="button">보컬</button>

                <div class="sort-actions">
                  <label class="inline-check">
                    <input type="checkbox" id="hideTagsToggle" />
                    태그 숨기기
                  </label>
                </div>
              </div>
            </div>

            <div id="songCardList" class="song-card-list"></div>

            <div class="glass-card">
              <div class="paging-bar">
                <div class="paging-left">
                  <button class="floating-btn compact-btn" id="prevPageBtn" type="button">이전</button>
                  <button class="floating-btn compact-btn" id="nextPageBtn" type="button">다음</button>
                  <div class="paging-info" id="pageInfo"></div>
                </div>

                <div class="paging-right">
                  <label class="paging-label" for="pageSizeSelect">페이지당</label>
                  <select id="pageSizeSelect" class="select paging-select">
                    <option value="50">50</option>
                    <option value="200">200</option>
                    <option value="100" selected>100</option>
                    <option value="500">500</option>
                  </select>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <!-- 신청곡 패널 -->
    <aside id="requestPanel" class="request-panel floating-request-panel">
      <div class="request-top-actions" id="requestExternalActions">
        <button
          class="floating-btn compact-btn request-top-btn request-top-secondary"
          id="requestManageToggleBtn"
          style="display: none"
          type="button"
        >
          상태변경
        </button>
        <button class="floating-btn compact-btn request-top-btn black-btn" id="requestOpenBtn" type="button">
          곡 신청하기
        </button>
      </div>

      <div class="request-panel-header">
        <div class="request-panel-title">신청곡 현황</div>
        <div class="toolbar-right">
          <button class="floating-btn compact-btn" id="requestRefreshBtn" type="button">새로고침</button>
          <button class="floating-btn compact-btn" id="requestHideBtn" type="button">숨기기</button>
        </div>
      </div>

      <div class="request-list" id="requestTableBody"></div>

      <div class="request-manage-bar" id="requestManageBar" style="display: none">
        <div class="request-manage-title" id="requestManageTitle">신청곡 선택 후 상태 변경</div>
        <div class="request-manage-actions">
          <button class="floating-btn compact-btn accept-btn request-mini-btn" data-status="accepted" type="button">
            O
          </button>
          <button class="floating-btn compact-btn danger-btn request-mini-btn" data-status="rejected" type="button">
            X
          </button>
          <button class="floating-btn compact-btn complete-blue-btn request-mini-btn" data-status="completed" type="button">
            완료
          </button>
          <button class="floating-btn compact-btn danger-strong-btn request-mini-btn" id="requestDeleteBtn" type="button">
            삭제
          </button>
        </div>

        <div class="request-manage-actions-secondary">
          <button class="floating-btn compact-btn danger-solid-btn" id="clearRequestsBtn" style="display: none" type="button">
            리스트 초기화
          </button>
        </div>
      </div>
    </aside>

    <button class="floating-btn compact-btn presence-show-btn" id="requestShowBtn" type="button">신청곡 나타내기</button>

    <!-- 접속자 패널 -->
    <aside id="presencePanel" class="presence-panel floating-presence-panel" style="display:block;">
      <div class="presence-header">
        <div class="presence-title">접속자</div>
        <div class="presence-actions">
          <button class="floating-btn compact-btn" id="presenceRefreshBtn" type="button">새로고침</button>
          <button class="floating-btn compact-btn" id="presenceHideBtn" type="button">숨기기</button>
        </div>
      </div>
      <div class="presence-list" id="presenceList"></div>
    </aside>

    <button class="floating-btn compact-btn presence-show-btn" id="presenceShowBtn" type="button" style="right:22px; bottom:78px;">
      접속자 나타내기
    </button>

    <!-- 세션 멤버 패널 -->
    <aside id="sessionPanel" class="session-panel floating-session-panel" style="display:none;">
      <div class="presence-header">
        <div class="presence-title">세션 멤버</div>
        <div class="presence-actions">
          <button class="floating-btn compact-btn" id="sessionCopyBtn" type="button">코드 복사</button>
          <button class="floating-btn compact-btn" id="sessionPanelHideBtn" type="button">숨기기</button>
        </div>
      </div>
      <div class="presence-list" id="sessionMembersList"></div>
      <div class="muted" style="margin-top:8px; font-weight:800;">
        페이지터너만 권한 양도/곡 팔로우/페이지 넘김 브로드캐스트 가능
      </div>
    </aside>

    <!-- 모달(필수만) -->
    <div class="modal-overlay" id="loginModal">
      <div class="modal">
        <div class="modal-title">로그인</div>
        <input id="loginId" class="input" placeholder="ID" />
        <input id="loginPw" class="input" type="password" placeholder="Password" />
        <div class="modal-actions">
          <button class="floating-btn" id="loginCloseBtn" type="button">닫기</button>
          <button class="floating-btn black-btn" id="loginSubmitBtn" type="button">로그인</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="requestModal">
      <div class="modal">
        <div class="modal-title">곡 신청하기</div>
        <input id="requesterInput" class="input" placeholder="신청자" />
        <input id="requestSongInput" class="input" placeholder="신청곡 제목" />
        <input id="requestArtistInput" class="input" placeholder="가수" />
        <input id="requestSingerInput" class="input" placeholder="누가 불러드릴까요?" />
        <div class="modal-actions">
          <button class="floating-btn" id="requestCancelBtn" type="button">취소</button>
          <button class="floating-btn black-btn" id="requestSubmitBtn" type="button">신청하기</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="editModal">
      <div class="modal">
        <div class="modal-title" id="editModalTitle"></div>
        <textarea id="editModalInput" rows="7"></textarea>
        <div class="modal-actions">
          <button class="floating-btn" id="editCancelBtn" type="button">취소</button>
          <button class="floating-btn black-btn" id="editSaveBtn" type="button">저장</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="randomModal">
      <div class="modal">
        <div class="modal-title">랜덤 추천곡</div>
        <div class="roulette-wrap">
          <div class="roulette-pointer"></div>
          <div class="roulette-wheel" id="rouletteWheel"></div>
        </div>
        <div class="random-result" id="randomResult">룰렛을 돌려 곡을 고릅니다...</div>
        <div class="modal-actions">
          <button class="floating-btn" id="randomOpenBtn" style="display: none" type="button">열기</button>
          <button class="floating-btn" id="randomRerollBtn" style="display: none" type="button">한번 더 뽑기</button>
          <button class="floating-btn black-btn" id="randomCloseBtn" type="button">닫기</button>
        </div>
      </div>
    </div>

    <!-- Profile modal (GAS 원본 이식) -->
    <div class="modal-overlay" id="profileModal">
      <div class="modal">
        <div class="modal-title">프로필 관리</div>

        <div class="profile-preview">
          <img id="profilePreview" class="profile-preview-image" alt="" />
        </div>

        <input id="profilePhotoInput" class="input" placeholder="드라이브 이미지 링크를 넣으세요" />

        <button class="floating-btn" id="toggleProfilePwBtn" type="button" style="justify-content:center;">
          비밀번호 변경
        </button>

        <div id="profilePasswordBox" class="profile-password-box" style="display:none;">
          <input type="password" id="profileCurrentPw" class="input" placeholder="현재 비밀번호" />
          <input type="password" id="profileNewPw" class="input" placeholder="새 비밀번호" />
          <input type="password" id="profileNewPw2" class="input" placeholder="새 비밀번호 확인" />
          <button class="floating-btn black-btn" id="profilePwSaveBtn" type="button">비밀번호 저장</button>
        </div>

        <div class="modal-actions">
          <button class="floating-btn" id="profileCancelBtn" type="button">취소</button>
          <button class="floating-btn black-btn" id="profileSaveBtn" type="button">업로드</button>
        </div>
      </div>
    </div>

    <!-- Create user modal (GAS 원본 이식) -->
    <div class="modal-overlay" id="createUserModal">
      <div class="modal">
        <div class="modal-title">유저 추가</div>
        <input id="createUserId" class="input" placeholder="유저 ID" />
        <select id="createUserRole" class="select">
          <option value="session">session</option>
          <option value="admin">admin</option>
        </select>
        <input id="createUserName" class="input" placeholder="표시 이름(옵션)" />
        <div class="modal-actions">
          <button class="floating-btn" id="createUserCancelBtn" type="button">취소</button>
          <button class="floating-btn black-btn" id="createUserSubmitBtn" type="button">생성</button>
        </div>
      </div>
    </div>

    <!-- Song tag edit modal (관리자 전용) -->
    <div class="modal-overlay" id="songTagModal">
      <div class="modal">
        <div class="modal-title">곡 태그 편집</div>
        <div class="muted" id="songTagModalSubtitle" style="font-weight:1000;"></div>

        <select id="songKeySelect" class="select">
          <option value="">조성(비움)</option>
          <option>Ab</option><option>A</option><option>A#</option><option>Bb</option><option>B</option>
          <option>Cb</option><option>C</option><option>C#</option><option>Db</option><option>D</option>
          <option>D#</option><option>Eb</option><option>E</option><option>E#</option><option>Fb</option>
          <option>F</option><option>F#</option><option>Gb</option><option>G</option><option>G#</option>
        </select>

        <select id="songGenreSelect" class="select">
          <option value="">장르(비움)</option>
          <option>KPOP</option><option>JPOP</option><option>POP</option><option>OST</option><option>기타</option>
        </select>

        <select id="songMoodSelect" class="select">
          <option value="">분위기(비움)</option>
          <option>발라드</option><option>락발라드</option><option>밴드송</option><option>댄스</option><option>뮤지컬</option><option>힙합</option><option>동요</option>
        </select>

        <select id="songVocalSelect" class="select">
          <option value="">보컬(비움)</option>
          <option>남솔로</option><option>여솔로</option><option>듀엣</option><option>그룹곡</option>
        </select>

        <div class="modal-actions">
          <button class="floating-btn" id="songTagCancelBtn" type="button">취소</button>
          <button class="floating-btn black-btn" id="songTagSaveBtn" type="button">저장</button>
        </div>
      </div>
    </div>

    <!-- Key select modal (조성 선택) -->
    <div class="modal-overlay" id="keySelectModal">
      <div class="modal">
        <div class="modal-title">키 선택</div>
        <div class="muted" id="keySelectSubtitle" style="font-weight:1000;"></div>
        <div class="row" id="keySelectButtons" style="margin-top:14px; gap:10px; flex-wrap:wrap;"></div>
        <div class="modal-actions">
          <button class="floating-btn" id="keySelectCancelBtn" type="button">취소</button>
        </div>
      </div>
    </div>

    <!-- Song action modal (복사/뷰어) -->
    <div class="modal-overlay" id="songActionModal">
      <div class="modal">
        <div class="modal-title">선택</div>
        <div class="muted" id="songActionSubtitle" style="font-weight:1000;"></div>
        <div class="row" style="margin-top:14px; gap:10px; flex-wrap:wrap;">
          <button class="floating-btn" id="copyDriveLinkBtn" type="button">구글 드라이브 링크 복사하기</button>
          <button class="floating-btn black-btn" id="openViewerBtn" type="button">세션뷰어에서 보기</button>
        </div>
        <div class="modal-actions">
          <button class="floating-btn" id="songActionCancelBtn" type="button">취소</button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/public/musicbook/musicbook.js"></script>
  </body>
</html>
