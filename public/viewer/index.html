<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <title>Score Viewer</title>
    <!-- cache-bust for mobile browsers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/naver/d2codingfont@master/D2Coding.css" />
    <link rel="stylesheet" href="viewer.css?v=20260527_14" />
  </head>
  <body>
    <div id="viewer-wrapper">
      <header id="topbar">
        <div class="left">
          <div class="brand">Score Viewer</div>
          <div class="inputRow">
            <div class="modeTabs" id="modeTabs">
              <button id="pdfModeBtn" type="button" class="tab active">PDF</button>
              <button id="chordModeBtn" type="button" class="tab hidden">코드</button>
            </div>
            <input id="linkInput" type="text" placeholder="구글드라이브 PDF 링크 또는 fileId" />
            <button id="openBtn" type="button" class="primary">열기</button>
            <button id="closeBtn" type="button">악보 닫기</button>
            <button id="songBookPickBtn" type="button" class="primary hidden">노래책에서 고르기</button>
          </div>
        </div>
        <div class="right">
          <div id="topToggles" class="topToggles">
            <button id="toggleLinkBtn" title="링크 입력줄 접기/펼치기">링크칸</button>
            <button id="toggleViewBtn" title="보기/넘김/확대 줄 접기/펼치기">보기옵션</button>
            <button id="toggleToolBtn" title="주석 도구 줄 접기/펼치기">도구바</button>
            <span class="vsep" aria-hidden="true"></span>
            <button id="createSessionFloatBtn" title="세션 만들기">세션만들기</button>
            <button id="sessionFloatBtn" title="세션 참여/나가기">세션참여</button>
            <button id="participantsBtn" type="button" class="mini">접속자</button>
            <span class="vsep" aria-hidden="true"></span>
            <button id="fullscreenBtn" type="button">전체화면</button>
            <button id="themeBtn" type="button">테마</button>
          </div>
          <span id="sessionBadge" class="badge hidden"></span>
          <span id="turnerBadge" class="badge hidden"></span>
          <span id="netBadge" class="badge hidden" title="PDF 로드 경로"></span>
        </div>
      </header>

      <!-- Toolbar (desktop). In touch-mode, this becomes a bottom sheet via CSS. -->
      <div class="toolbarShell" id="toolbarShell">
        <div class="toolbarRow" id="viewBar">
          <div class="group">
            <span class="label">보기</span>
            <div class="seg">
              <button id="spread1Btn" type="button" class="mini">1p</button>
              <button id="spread2Btn" type="button" class="mini">2p</button>
              <button id="spread3Btn" type="button" class="mini">3p</button>
              <button id="spread4Btn" type="button" class="mini">4p</button>
            </div>
          </div>

          <div class="group">
            <span class="label">넘김</span>
            <div class="seg">
              <button id="turnUnitSpreadBtn" type="button" class="mini">한번에</button>
              <button id="turnUnitSingleBtn" type="button" class="mini">한페이지씩</button>
            </div>
          </div>

          <div class="group">
            <span class="label">겹침</span>
            <input id="overlapRange" type="range" min="0" max="40" value="0" />
            <span class="kv"><span id="overlapLabel">0px</span></span>
          </div>

          <div class="group">
            <span class="label">줌</span>
            <button id="zoomOutBtn" type="button" class="mini">-</button>
            <button id="fitBtn" type="button" class="mini">100%</button>
            <button id="zoomInBtn" type="button" class="mini">+</button>
          </div>

          <div class="group" id="mobileModeGroup">
            <span class="label">모바일</span>
            <div class="seg">
              <button id="mobileAutoBtn" type="button" class="mini">auto</button>
              <button id="mobileOnBtn" type="button" class="mini">on</button>
              <button id="mobileOffBtn" type="button" class="mini">off</button>
            </div>
          </div>

          <!-- 코드위키 모드: 편집만 노출 -->
          <div class="group hidden" id="cwEditGroup">
            <span class="label">코드뷰</span>
            <button id="chordEditBtn" type="button" class="mini" title="페이지터너/관리자용">편집</button>
          </div>

          <div class="spacer"></div>

          <div class="group" id="pageInfoGroup">
            <span class="label">페이지</span>
            <span class="kv"><span id="pageLabel">1</span><span id="pageTotal">/ ?</span></span>
          </div>

          <div class="group" id="keyMapGroup">
            <span class="label">키매핑</span>
            <button id="bindPrevBtn" type="button" class="mini">이전</button>
            <span class="kv" id="bindPrevLabel">ArrowLeft/PageUp</span>
            <button id="bindNextBtn" type="button" class="mini">다음</button>
            <span class="kv" id="bindNextLabel">ArrowRight/PageDown/Space</span>
            <button id="bindResetBtn" type="button" class="mini">초기화</button>
          </div>
        </div>

        <div class="toolbarRow" id="toolBar">
          <div class="group">
            <span class="label">도구</span>
            <div class="seg">
              <button id="selectBtn" type="button" class="mini" title="선택">선택</button>
              <button id="penBtn" type="button" class="mini iconBtn" aria-label="pen" title="펜">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                  <path fill="currentColor" d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/>
                </svg>
              </button>
              <button id="highlighterBtn" type="button" class="mini iconBtn" aria-label="highlighter" title="형광펜">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                  <path fill="currentColor" fill-rule="evenodd" d="M11.096.644a2 2 0 0 1 2.791.036l1.433 1.433a2 2 0 0 1 .035 2.791l-.413.435-8.07 8.995a.5.5 0 0 1-.372.166h-3a.5.5 0 0 1-.234-.058l-.412.412A.5.5 0 0 1 2.5 15h-2a.5.5 0 0 1-.354-.854l1.412-1.412A.5.5 0 0 1 1.5 12.5v-3a.5.5 0 0 1 .166-.372l8.995-8.07zm-.115 1.47L2.727 9.52l3.753 3.753 7.406-8.254zm3.585 2.17.064-.068a1 1 0 0 0-.017-1.396L13.18 1.387a1 1 0 0 0-1.396-.018l-.068.065zM5.293 13.5 2.5 10.707v1.586L3.707 13.5z"/>
                </svg>
              </button>
              <button id="lineBtn" type="button" class="mini iconBtn" aria-label="line" title="선">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                  <path fill="currentColor" fill-rule="evenodd" d="M2 8a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11A.5.5 0 0 1 2 8"/>
                </svg>
              </button>
              <button id="rectBtn" type="button" class="mini iconBtn" aria-label="rectangle" title="사각형">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                  <path fill="currentColor" d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"/>
                </svg>
              </button>
              <button id="circleBtn" type="button" class="mini iconBtn" aria-label="circle" title="원">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                  <path fill="currentColor" d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                </svg>
              </button>
              <button id="eraserBtn" type="button" class="mini iconBtn" aria-label="eraser" title="지우개">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                  <path fill="currentColor" d="M8.086 2.207a2 2 0 0 1 2.828 0l3.879 3.879a2 2 0 0 1 0 2.828l-5.5 5.5A2 2 0 0 1 7.879 15H5.12a2 2 0 0 1-1.414-.586l-2.5-2.5a2 2 0 0 1 0-2.828zm2.121.707a1 1 0 0 0-1.414 0L4.16 7.547l5.293 5.293 4.633-4.633a1 1 0 0 0 0-1.414zM8.746 13.547 3.453 8.254 1.914 9.793a1 1 0 0 0 0 1.414l2.5 2.5a1 1 0 0 0 .707.293H7.88a1 1 0 0 0 .707-.293z"/>
                </svg>
              </button>
              <button id="textBtn" type="button" class="mini iconBtn" aria-label="text" title="텍스트">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                  <path fill="currentColor" d="M12.258 3h-8.51l-.083 2.46h.479c.26-1.544.758-1.783 2.693-1.845l.424-.013v7.827c0 .663-.144.82-1.3.923v.52h4.082v-.52c-1.162-.103-1.306-.26-1.306-.923V3.602l.431.013c1.934.062 2.434.301 2.693 1.846h.479z"/>
                </svg>
              </button>
              <button id="laserBtn" type="button" class="mini iconBtn" aria-label="laser" title="레이저">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                  <path fill="currentColor" d="M8.5.5a.5.5 0 0 0-1 0v.518A7 7 0 0 0 1.018 7.5H.5a.5.5 0 0 0 0 1h.518A7 7 0 0 0 7.5 14.982v.518a.5.5 0 0 0 1 0v-.518A7 7 0 0 0 14.982 8.5h.518a.5.5 0 0 0 0-1h-.518A7 7 0 0 0 8.5 1.018zm-6.48 7A6 6 0 0 1 7.5 2.02v.48a.5.5 0 0 0 1 0v-.48a6 6 0 0 1 5.48 5.48h-.48a.5.5 0 0 0 0 1h.48a6 6 0 0 1-5.48 5.48v-.48a.5.5 0 0 0-1 0v.48A6 6 0 0 1 2.02 8.5h.48a.5.5 0 0 0 0-1zM8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4"/>
                </svg>
              </button>
              <button id="cursorShareBtn" type="button" class="mini" title="커서공유">커서공유</button>
            </div>
          </div>

          <div class="group" id="cursorModeGroup" style="display:none;">
            <span class="label">커서</span>
            <div class="seg">
              <button id="cursorModeLineBtn" type="button" class="mini">현재부분</button>
              <button id="cursorModeRowBtn" type="button" class="mini">한줄전체</button>
            </div>
          </div>

          <!-- cwLayoutGroup: 보기옵션(viewBar)로 이동 -->

          <div class="group" id="brushGroup">
            <span class="label">옵션</span>
            <span class="kv">굵기</span>
            <input id="brushSize" type="range" min="1" max="20" value="3" />
            <span class="kv">색</span>
            <input id="colorPicker" type="color" value="#ff2d55" />
          </div>

          <div class="group" id="textOptionGroup">
            <span class="label">텍스트</span>
            <span class="kv">크기</span>
            <input id="fontSize" type="range" min="12" max="60" value="22" />
          </div>

          <div class="spacer"></div>
          <div class="group">
            <button id="undoBtn" type="button" class="mini iconBtn" aria-label="undo" title="Undo">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                <path fill="currentColor" fill-rule="evenodd" d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 0-.908-.417A6 6 0 1 0 8 2z"/>
                <path fill="currentColor" d="M8 4.466V.534a.25.25 0 0 0-.41-.192L5.23 2.308a.25.25 0 0 0 0 .384l2.36 1.966A.25.25 0 0 0 8 4.466"/>
              </svg>
            </button>
            <button id="redoBtn" type="button" class="mini iconBtn" aria-label="redo" title="Redo">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" aria-hidden="true">
                <path fill="currentColor" fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/>
                <path fill="currentColor" d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/>
              </svg>
            </button>
            <button id="clearBtn" type="button" class="mini danger">주석 전체삭제</button>
          </div>
        </div>
      </div>

      <main id="stage">
        <!-- touch-mode header/bottom (원본) -->
        <div id="touchHeader">
          <div class="touchRow">
            <span id="touchRoomBadge" class="badge hidden"></span>
            <span id="touchTurnerBadge" class="badge hidden"></span>
            <span id="touchPageInfo" class="muted"></span>
          </div>
        </div>

        <div id="pdf-container">
          <!-- Preview(iframe) mode: pseudo pagination viewport -->
          <div id="preview-root" class="hidden">
            <div id="preview-viewport">
              <iframe id="pdf-preview" title="pdf-preview"></iframe>
            </div>
          </div>
          <div id="canvas-stack">
            <!-- page views injected by viewer.js -->
          </div>
          <div id="pageHud" class="hidden"></div>
          <div id="tapZoneLeft"></div>
          <div id="tapZoneCenter"></div>
          <div id="tapZoneRight"></div>
        </div>

        <!-- CodeWiki mode (패널 UI 최소화: 결과 영역만 유지) -->
        <section id="chordwikiPane" class="hidden">
          <div id="cwError" class="muted hidden"></div>
          <div id="cwMeta" class="muted hidden"></div>
          <div id="cwScroll" class="cwScroll">
            <div id="cwInner" class="cwInner">
              <div id="cwAnnoHost"></div>
              <div id="cwContent" class="chord-sheet"></div>
            </div>
          </div>
        </section>

        <div id="touchNavBottom">
          <button id="touchPrevBtn" type="button">◀</button>
          <button id="touchMenuBtn" type="button">세션</button>
          <button id="touchNextBtn" type="button">▶</button>
        </div>

        <aside id="participantsPanel" class="hidden">
          <div class="panelTitleRow">
            <div class="panelTitle">세션 접속자</div>
            <button id="participantsToggleBtn" type="button" class="panelToggleBtn">감추기</button>
          </div>
          <div id="participantsBody">
            <div id="participantsList"></div>
          </div>
        </aside>
      </main>
    </div>

    <!-- prompt() 대체: 입력 모달 (닉네임/룸코드) -->
    <div class="modalOverlay hidden" id="inputModal">
      <div class="modalBox">
        <div class="modalTitle" id="inputModalTitle">입력</div>
        <input id="inputModalField" class="modalInput" />
        <div class="modalActions">
          <button id="inputModalCancelBtn" type="button">취소</button>
          <button id="inputModalOkBtn" type="button" class="primary">확인</button>
        </div>
      </div>
    </div>

    <!-- 모바일: 닉네임 + 세션코드 동시 입력 -->
    <div class="modalOverlay hidden" id="joinModal">
      <div class="modalBox">
        <div class="modalTitle">세션 참여</div>
        <input id="joinNickField" class="modalInput" placeholder="닉네임" />
        <div style="height:10px;"></div>
        <input id="joinRoomField" class="modalInput" placeholder="참여 세션 코드(선택)" />
        <div class="modalActions">
          <button id="joinCancelBtn" type="button">취소</button>
          <button id="joinOkBtn" type="button" class="primary">확인</button>
        </div>
      </div>
    </div>

    <!-- 노래책에서 고르기 모달 -->
    <div class="modalOverlay hidden" id="songPickModal">
      <div class="modalBox">
        <div class="modalTitle">노래책에서 고르기</div>
        <input id="songPickSearch" class="modalInput" placeholder="곡명/가수 검색" />
        <div id="songPickHint" class="muted" style="margin-top:8px;">검색해서 곡을 선택하세요.</div>
        <div id="songPickList" class="songPickList"></div>
        <div class="modalActions">
          <button id="songPickCloseBtn" type="button">닫기</button>
        </div>
      </div>
    </div>

    <!-- 코드뷰어 편집(페이지터너/관리자): 통텍스트 편집 -->
    <div class="modalOverlay hidden" id="chordEditModal">
      <div class="modalBox chordEditModalBox">
        <div class="modalTitle">코드뷰어 편집</div>
        <div class="muted" style="margin-top:6px; line-height:1.35;">
          1) 위: 코드행 / 아래: 가사행 형식으로 수정하세요. 저장하면 덮어씌워집니다.
        </div>
        <div class="muted" id="chordEditDocInfo" style="margin-top:6px;"></div>
        <textarea id="chordEditField" class="modalTextarea chordEditTextarea" spellcheck="false"></textarea>
        <div class="modalActions">
          <button id="chordEditCancelBtn" type="button">취소</button>
          <button id="chordEditSaveBtn" type="button" class="primary">저장</button>
        </div>
      </div>
    </div>

    <!-- pdf.js + fabric.js (CDN, GAS 원본과 동일 계열) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="../config.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="viewer.js?v=20260528_4"></script>
  </body>
</html>
