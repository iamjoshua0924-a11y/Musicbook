<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viewer</title>
    <link rel="stylesheet" href="/public/viewer/viewer.css" />
  </head>
  <body>
    <div id="viewer-wrapper">
      <header id="topbar">
        <div class="left">
          <strong>Viewer</strong>
          <span id="fileIdBadge"></span>
        </div>
        <div class="right">
          <div class="pageControls">
            <button id="prevBtn" type="button">이전</button>
            <span id="pageLabel">1</span>
            <span id="pageTotal">/ ?</span>
            <button id="nextBtn" type="button">다음</button>
          </div>
          <label class="toggle">
            <input type="checkbox" id="sessionToggle" />
            <span>주석공유 세션 참여</span>
          </label>
          <button id="createSessionBtn" type="button">세션 만들기</button>
          <span id="sessionBadge" class="badge hidden"></span>
          <span id="turnerBadge" class="badge hidden"></span>
          <button id="fullscreenBtn" type="button">전체화면</button>
        </div>
      </header>

      <main id="stage">
        <div id="pdf-container">
          <iframe id="pdf-preview" class="hidden"></iframe>
          <div id="canvas-stack">
            <!-- page views injected by viewer.js -->
          </div>
          <div id="pageHud" class="hidden"></div>
        </div>

        <button id="fab">✎</button>
        <div id="fabPanel" class="hidden">
          <div class="panelTitle">주석 팔레트</div>
          <div class="row">
            <button id="penBtn" type="button">펜</button>
            <button id="highlighterBtn" type="button">형광펜</button>
            <button id="eraserBtn" type="button">지우개</button>
            <button id="selectBtn" type="button">선택</button>
          </div>
          <div class="row">
            <button id="lineBtn" type="button">선</button>
            <button id="rectBtn" type="button">사각</button>
            <button id="circleBtn" type="button">원</button>
            <button id="textBtn" type="button">텍스트</button>
          </div>
          <div class="row">
            <label class="label">굵기</label>
            <input id="brushSize" type="range" min="1" max="20" value="3" />
          </div>
          <div class="row">
            <label class="label">색</label>
            <input id="colorPicker" type="color" value="#ff2d55" />
          </div>
          <div class="row">
            <button id="undoBtn" type="button">Undo</button>
            <button id="redoBtn" type="button">Redo</button>
            <button id="clearBtn" type="button">전체삭제</button>
          </div>
          <div class="row">
            <label class="label">보기</label>
            <button id="spread1Btn" type="button">1p</button>
            <button id="spread2Btn" type="button">2p</button>
            <button id="spread3Btn" type="button">3p</button>
            <button id="spread4Btn" type="button">4p</button>
          </div>
          <div class="row">
            <label class="label">줌</label>
            <button id="zoomOutBtn" type="button">-</button>
            <button id="fitBtn" type="button">FIT</button>
            <button id="zoomInBtn" type="button">+</button>
          </div>
          <div class="row">
            <label class="label">모드</label>
            <button id="focusModeBtn" type="button">포커스</button>
            <button id="perfModeBtn" type="button">퍼포먼스</button>
          </div>
          <div class="row">
            <button id="openFromLinkBtn" type="button">Drive 링크로 열기</button>
            <button id="fullscreenBtn2" type="button">전체화면</button>
          </div>
        </div>

        <aside id="participantsPanel" class="hidden">
          <div class="panelTitle">세션 접속자</div>
          <div id="participantsList"></div>
        </aside>
      </main>
    </div>

    <!-- pdf.js + fabric.js (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/6.6.0/fabric.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/public/viewer/viewer.js"></script>
  </body>
</html>
