<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <title>Score Viewer</title>
    <!-- cache-bust for mobile browsers -->
    <link rel="stylesheet" href="/public/viewer/viewer.css?v=20260520_01" />
  </head>
  <body>
    <div id="viewer-wrapper">
      <header id="topbar">
        <div class="left">
          <div class="brand">Score Viewer</div>
          <div class="inputRow">
            <input id="linkInput" type="text" placeholder="구글드라이브 PDF 링크 또는 fileId" />
            <button id="openBtn" type="button" class="primary">열기</button>
            <button id="songBookPickBtn" type="button" class="primary hidden">노래책에서 고르기</button>
          </div>
        </div>
        <div class="right">
          <div id="topToggles" class="topToggles">
            <button id="toggleLinkBtn" title="링크 입력줄 접기/펼치기">링크칸</button>
            <button id="toggleViewBtn" title="보기/넘김/확대 줄 접기/펼치기">보기</button>
            <button id="toggleToolBtn" title="주석 도구 줄 접기/펼치기">도구</button>
            <button id="sessionFloatBtn" title="세션 참여/나가기">세션</button>
            <button id="createSessionFloatBtn" title="세션 만들기">만들기</button>
            <button id="fullscreenBtn" type="button">전체화면</button>
            <button id="themeBtn" type="button">테마</button>
          </div>
          <span id="sessionBadge" class="badge hidden"></span>
          <span id="turnerBadge" class="badge hidden"></span>
        </div>
      </header>

      <!-- Toolbar (desktop). In touch-mode, this becomes a bottom sheet via CSS. -->
      <div class="toolbarShell" id="toolbarShell">
        <div class="toolbarRow" id="viewBar">
          <div class="group">
            <span class="label">보기</span>
            <div class="seg">
              <button id="spread1Btn" type="button" class="mini">1p</button>
              <button id="spread2Btn" type="button" class="mini">2p</button>
              <button id="spread3Btn" type="button" class="mini">3p</button>
              <button id="spread4Btn" type="button" class="mini">4p</button>
            </div>
          </div>

          <div class="group">
            <span class="label">넘김</span>
            <div class="seg">
              <button id="turnUnitSpreadBtn" type="button" class="mini">한번에</button>
              <button id="turnUnitSingleBtn" type="button" class="mini">한페이지씩</button>
            </div>
          </div>

          <div class="group">
            <span class="label">겹침</span>
            <input id="overlapRange" type="range" min="0" max="40" value="0" />
            <span class="kv"><span id="overlapLabel">0px</span></span>
          </div>

          <div class="group">
            <span class="label">줌</span>
            <button id="zoomOutBtn" type="button" class="mini">-</button>
            <button id="fitBtn" type="button" class="mini">100%</button>
            <button id="zoomInBtn" type="button" class="mini">+</button>
          </div>

          <div class="spacer"></div>

          <div class="group" id="pageInfoGroup">
            <span class="label">페이지</span>
            <span class="kv"><span id="pageLabel">1</span><span id="pageTotal">/ ?</span></span>
          </div>

          <div class="group" id="keyMapGroup">
            <span class="label">키매핑</span>
            <button id="bindPrevBtn" type="button" class="mini">이전</button>
            <span class="kv" id="bindPrevLabel">ArrowLeft/PageUp</span>
            <button id="bindNextBtn" type="button" class="mini">다음</button>
            <span class="kv" id="bindNextLabel">ArrowRight/PageDown/Space</span>
            <button id="bindResetBtn" type="button" class="mini">초기화</button>
          </div>
        </div>

        <div class="toolbarRow" id="toolBar">
          <div class="group">
            <span class="label">도구</span>
            <div class="seg">
              <button id="selectBtn" type="button" class="mini">선택</button>
              <button id="penBtn" type="button" class="mini">펜</button>
              <button id="highlighterBtn" type="button" class="mini">형광펜</button>
              <button id="lineBtn" type="button" class="mini">선</button>
              <button id="rectBtn" type="button" class="mini">사각</button>
              <button id="circleBtn" type="button" class="mini">원</button>
              <button id="eraserBtn" type="button" class="mini">지우개</button>
              <button id="textBtn" type="button" class="mini">텍스트</button>
              <button id="laserBtn" type="button" class="mini">레이저</button>
              <button id="cursorShareBtn" type="button" class="mini">커서공유</button>
            </div>
          </div>
          <div class="spacer"></div>
          <div class="group">
            <button id="undoBtn" type="button" class="mini" aria-label="undo">↶</button>
            <button id="redoBtn" type="button" class="mini" aria-label="redo">↷</button>
            <button id="clearBtn" type="button" class="mini danger">주석 전체삭제</button>
          </div>
        </div>
      </div>

      <main id="stage">
        <!-- touch-mode header/bottom (원본) -->
        <div id="touchHeader">
          <div class="touchRow">
            <span id="touchRoomBadge" class="badge hidden"></span>
            <span id="touchTurnerBadge" class="badge hidden"></span>
            <span id="touchPageInfo" class="muted"></span>
          </div>
        </div>

        <div id="pdf-container">
          <iframe id="pdf-preview" class="hidden"></iframe>
          <div id="canvas-stack">
            <!-- page views injected by viewer.js -->
          </div>
          <div id="pageHud" class="hidden"></div>
          <div id="tapZoneLeft"></div>
          <div id="tapZoneCenter"></div>
          <div id="tapZoneRight"></div>
        </div>

        <!-- Mobile-only floating menu button (원본: touch-mode에서만) -->
        <button id="fab" class="fabMore" aria-label="menu">⋯</button>

        <div id="touchNavBottom">
          <button id="touchPrevBtn" type="button">◀</button>
          <button id="touchMenuBtn" type="button">⋯</button>
          <button id="touchNextBtn" type="button">▶</button>
        </div>

        <aside id="participantsPanel" class="hidden">
          <div class="panelTitleRow">
            <div class="panelTitle">세션 접속자</div>
            <button id="participantsToggleBtn" type="button" class="panelToggleBtn">감추기</button>
          </div>
          <div id="participantsBody">
            <div id="participantsList"></div>
          </div>
        </aside>
      </main>
    </div>

    <!-- prompt() 대체: 입력 모달 (닉네임/룸코드) -->
    <div class="modalOverlay hidden" id="inputModal">
      <div class="modalBox">
        <div class="modalTitle" id="inputModalTitle">입력</div>
        <input id="inputModalField" class="modalInput" />
        <div class="modalActions">
          <button id="inputModalCancelBtn" type="button">취소</button>
          <button id="inputModalOkBtn" type="button" class="primary">확인</button>
        </div>
      </div>
    </div>

    <!-- 모바일: 닉네임 + 세션코드 동시 입력 -->
    <div class="modalOverlay hidden" id="joinModal">
      <div class="modalBox">
        <div class="modalTitle">세션 참여</div>
        <input id="joinNickField" class="modalInput" placeholder="닉네임" />
        <div style="height:10px;"></div>
        <input id="joinRoomField" class="modalInput" placeholder="참여 세션 코드(선택)" />
        <div class="modalActions">
          <button id="joinCancelBtn" type="button">취소</button>
          <button id="joinOkBtn" type="button" class="primary">확인</button>
        </div>
      </div>
    </div>

    <!-- 노래책에서 고르기 모달 -->
    <div class="modalOverlay hidden" id="songPickModal">
      <div class="modalBox">
        <div class="modalTitle">노래책에서 고르기</div>
        <input id="songPickSearch" class="modalInput" placeholder="곡명/가수 검색" />
        <div id="songPickHint" class="muted" style="margin-top:8px;">검색해서 곡을 선택하세요.</div>
        <div id="songPickList" class="songPickList"></div>
        <div class="modalActions">
          <button id="songPickCloseBtn" type="button">닫기</button>
        </div>
      </div>
    </div>

    <!-- pdf.js + fabric.js (CDN, GAS 원본과 동일 계열) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/public/viewer/viewer.js?v=20260520_01"></script>
  </body>
</html>
