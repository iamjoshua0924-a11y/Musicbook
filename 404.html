<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MusicBook</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          // GitHub Pages(Project Pages)에서 /public/musicbook/<...> 딥링크는 404가 난다.
          // -> 404에서 송북 엔트리로 이동시키고, 원래 경로는 sessionStorage로 넘겨서 SPA가 복구한다.
          var full = location.pathname + location.search + location.hash;
          sessionStorage.setItem('mb_spa_redirect_v1', full);
        } catch {}

        // IMPORTANT:
        // GitHub Pages는 404.html을 "요청한 URL"에 그대로 서빙한다(주소창 경로가 유지됨).
        // 따라서 상대경로(./public/musicbook/)를 쓰면 /public/musicbook/... 가 계속 중첩될 수 있다.
        // -> 항상 절대 경로 기반으로 송북 엔트리로 이동한다.
        var p = String(location.pathname || '');
        var base = '/public/musicbook/';
        var idx1 = p.indexOf('/public/musicbook/');
        if (idx1 >= 0) base = p.slice(0, idx1) + '/public/musicbook/';
        else {
          var idx2 = p.indexOf('/musicbook/');
          if (idx2 >= 0) base = p.slice(0, idx2) + '/musicbook/';
        }
        try {
          location.replace(base);
        } catch {
          location.href = base;
        }
      })();
    </script>
  </body>
</html>
